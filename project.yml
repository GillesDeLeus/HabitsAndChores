name: HabitsAndChores
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "859H669NGL"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    # Localizations the app advertises (drives the String Catalog + per-app language).
    INFOPLIST_KEY_CFBundleLocalizations: "en fr nl it pl es de"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  HabitsAndChores:
    type: application
    platform: iOS
    sources:
      - path: HabitsAndChores
        # Info.plist & entitlements are referenced by build setting, not copied as resources.
        excludes:
          - HabitsAndChores.entitlements
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beullens.homesuite.HabitsAndChores
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Habits & Chores
        # Partial plist (UIBackgroundModes: remote-notification) merged with generated keys
        # so CloudKit can receive background sync push.
        INFOPLIST_FILE: HabitsAndChores/Info.plist
        # iCloud/CloudKit + Sign in with Apple + Push capabilities live in this entitlements file.
        CODE_SIGN_ENTITLEMENTS: HabitsAndChores/HabitsAndChores.entitlements
    dependencies:
      - target: HabitsAndChoresWidget

  HabitsAndChoresWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HabitsAndChoresWidget
        # Info.plist & entitlements are referenced by build setting, not copied as resources.
        excludes:
          - Info.plist
          - HabitsAndChoresWidget.entitlements
      # Shared model + scheduling code reused by the widget.
      - path: HabitsAndChores/Models
      - path: HabitsAndChores/Services/SchedulingEngine.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beullens.homesuite.HabitsAndChores.Widget
        INFOPLIST_KEY_CFBundleDisplayName: Habits Widget
        # An app extension must declare an NSExtension dictionary. GENERATE_INFOPLIST_FILE
        # has no key for nested dicts, so it is supplied via this partial plist and merged
        # with the generated keys at build time.
        INFOPLIST_FILE: HabitsAndChoresWidget/Info.plist
        # CloudKit access so the widget shares the synced store with the app.
        CODE_SIGN_ENTITLEMENTS: HabitsAndChoresWidget/HabitsAndChoresWidget.entitlements

  HabitsAndChoresTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: HabitsAndChores
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # Logic tests; no host app needed.

# Explicit shared scheme for the app so it is always generated and visible in Xcode
# (the widget builds as a dependency; its own scheme is still auto-created for debugging).
schemes:
  HabitsAndChores:
    build:
      targets:
        HabitsAndChores: all
    test:
      targets:
        - HabitsAndChoresTests
      config: Debug
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
